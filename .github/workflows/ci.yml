name: CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: social_media
          MYSQL_USER: social_user
          MYSQL_PASSWORD: "12345"
          MYSQL_ROOT_PASSWORD: "12345"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -usocial_user -p12345"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            tests/package-lock.json

      - name: Run API tests
        working-directory: api
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client tests
        working-directory: client
        run: npm test

      - name: Install black-box test dependencies
        working-directory: tests
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start API
        working-directory: api
        run: |
          nohup ./mvnw spring-boot:run > ../api.log 2>&1 &
          for i in {1..60}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/auth/signin || true)
            if [ "$status" != "000" ]; then
              exit 0
            fi
            sleep 2
          done
          cat ../api.log
          exit 1

      - name: Start client
        working-directory: client
        env:
          NEXT_PUBLIC_BASE_URL: http://localhost:8080
        run: |
          nohup npm run dev > ../client.log 2>&1 &
          for i in {1..60}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)
            if [ "$status" != "000" ]; then
              exit 0
            fi
            sleep 2
          done
          cat ../client.log
          exit 1

      - name: Run black-box tests
        working-directory: tests
        env:
          API_BASE_URL: http://localhost:8080
          FRONTEND_BASE_URL: http://localhost:3000
        run: npm test
